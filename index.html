<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Lia Ternis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      --bg-color: #f9fafb;
      --card-bg: #ffffff;
      --text-main: #111827;
      --text-muted: #6b7280;
      --accent-color: #3b82f6;
      --border-color: #e5e7eb;
      --hover-bg: #f3f4f6;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      -webkit-user-select: none;
      user-select: none;
    }

    .card {
      max-width: 560px;
      width: 100%;
      padding: 3rem 2.5rem;
      animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .eyebrow {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    h1 {
      font-size: 2.25rem;
      font-weight: 600;
      color: var(--text-main);
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .divider {
      height: 1px;
      background-color: var(--border-color);
      margin: 2rem 0;
      width: 100%;
    }

    /* Links */
    .links {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      text-decoration: none;
      color: var(--text-main);
      padding: 1.25rem 1.5rem;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      transition: all 0.2s ease;
      background: var(--card-bg);
    }

    @media (hover: hover) {
      .link-item:hover {
        border-color: var(--accent-color);
        background-color: var(--hover-bg);
        box-shadow: 0 4px 12px rgba(59, 130, 246, 0.08);
      }
    }

    .link-item:active {
      transform: scale(0.95);
    }

    .icon-wrap {
      width: 2.5rem;
      height: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--hover-bg);
      color: var(--text-muted);
      border-radius: 50%;
      flex-shrink: 0;
      transition: color 0.2s ease, background-color 0.2s ease;
    }

    @media (hover: hover) {
      .link-item:hover .icon-wrap {
        color: var(--accent-color);
        background-color: rgba(59, 130, 246, 0.1);
      }
    }

    .icon-wrap svg {
      stroke-width: 2;
    }

    .link-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .link-label {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 0.125rem;
    }

    .link-value {
      font-size: clamp(0.75rem, 4vw, 0.95rem);
      font-weight: 500;
      color: var(--text-main);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .link-arrow {
      color: var(--text-muted);
      opacity: 0;
      transform: translateX(-8px);
      transition: all 0.2s ease;
    }

    @media (hover: hover) {
      .link-item:hover .link-arrow {
        opacity: 1;
        transform: translateX(0);
        color: var(--accent-color);
      }
    }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 2rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .footer-text {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .footer-link {
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    @media (hover: hover) {
      .footer-link:hover {
        color: var(--accent-color);
      }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .card { padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="header">
      <p class="eyebrow">Persönliche Seite</p>
      <h1>Lia Ternis</h1>
    </div>

    <div class="divider"></div>

    <div class="links">

      <a class="link-item" href="mailto:lia@lia.ternismail.de">
        <div class="icon-wrap">
          <i data-lucide="mail" style="width:20px;height:20px;"></i>
        </div>
        <div class="link-content">
          <span class="link-label">E-Mail</span>
          <span class="link-value">lia@lia.ternismail.de</span>
        </div>
        <div class="link-arrow">
          <i data-lucide="arrow-right" style="width:16px;height:16px;"></i>
        </div>
      </a>

      <a class="link-item" href="https://ternis.eu" target="_blank" rel="noopener">
        <div class="icon-wrap">
          <i data-lucide="home" style="width:20px;height:20px;"></i>
        </div>
        <div class="link-content">
          <span class="link-label">Familia</span>
          <span class="link-value">ternis.eu</span>
        </div>
        <div class="link-arrow">
          <i data-lucide="arrow-right" style="width:16px;height:16px;"></i>
        </div>
      </a>

      <a class="link-item" href="https://fabianternis.de" target="_blank" rel="noopener">
        <div class="icon-wrap">
          <i data-lucide="wrench" style="width:20px;height:20px;"></i>
        </div>
        <div class="link-content">
          <span class="link-label">Hostmaster</span>
          <span class="link-value">fabianternis.de</span>
        </div>
        <div class="link-arrow">
          <i data-lucide="arrow-right" style="width:16px;height:16px;"></i>
        </div>
      </a>

      <a class="link-item" href="https://ternismail.de" target="_blank" rel="noopener">
        <div class="icon-wrap">
          <i data-lucide="server" style="width:20px;height:20px;"></i>
        </div>
        <div class="link-content">
          <span class="link-label">Mailsystem</span>
          <span class="link-value">ternismail.de</span>
        </div>
        <div class="link-arrow">
          <i data-lucide="arrow-right" style="width:16px;height:16px;"></i>
        </div>
      </a>

      <a class="link-item" href="https://ternis-edv.de" target="_blank" rel="noopener">
        <div class="icon-wrap">
          <i data-lucide="monitor" style="width:20px;height:20px;"></i>
        </div>
        <div class="link-content">
          <span class="link-label">Ternis EDV</span>
          <span class="link-value">ternis-edv.de</span>
        </div>
        <div class="link-arrow">
          <i data-lucide="arrow-right" style="width:16px;height:16px;"></i>
        </div>
      </a>

    </div>

    <div class="divider"></div>

    <div class="footer">
      <p class="footer-text">lia.ternis.eu &copy; <span id="currentYear"></span></p>
      <p class="footer-text">Domain von dnbx.de</p>
      <p class="footer-text"><a href="https://fabianternis.de/impressum" class="footer-link">Impressum auf fabianternis.de</a></p>
    </div>

  </div>

  <script>
    document.getElementById('currentYear').textContent = new Date().getFullYear();
    lucide.createIcons();
  </script>
</body>
</html>
